<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>RenanCalc Pro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #141e30, #243b55);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .calculator {
      background: #1f2937;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
      width: 320px;
    }

    .title {
      color: #00e5ff;
      text-align: center;
      margin-bottom: 10px;
      font-weight: bold;
      font-size: 18px;
    }

    .display {
      width: 100%;
      height: 60px;
      background: #111827;
      border: none;
      border-radius: 10px;
      margin-bottom: 15px;
      padding: 10px;
      font-size: 24px;
      color: #fff;
      text-align: right;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      height: 55px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .num {
      background: #374151;
      color: white;
    }

    .op {
      background: #00e5ff;
      color: black;
      font-weight: bold;
    }

    .equal {
      background: #22c55e;
      color: white;
      grid-column: span 2;
    }

    .clear {
      background: #ef4444;
      color: white;
    }

  </style>
</head>
<body>

  <div class="calculator">
    <div class="title">RenanCalc Pro 🚀</div>
    <input type="text" id="display" class="display" disabled>

    <div class="buttons">
      <button class="clear" onclick="clearDisplay()">C</button>
      <button class="op" onclick="append('/')">÷</button>
      <button class="op" onclick="append('*')">×</button>
      <button class="op" onclick="append('-')">−</button>

      <button class="num" onclick="append('7')">7</button>
      <button class="num" onclick="append('8')">8</button>
      <button class="num" onclick="append('9')">9</button>
      <button class="op" onclick="append('+')">+</button>

      <button class="num" onclick="append('4')">4</button>
      <button class="num" onclick="append('5')">5</button>
      <button class="num" onclick="append('6')">6</button>
      <button class="equal" onclick="calculate()">=</button>

      <button class="num" onclick="append('1')">1</button>
      <button class="num" onclick="append('2')">2</button>
      <button class="num" onclick="append('3')">3</button>

      <button class="num" onclick="append('0')">0</button>
      <button class="num" onclick="append('.')">.</button>
    </div>
  </div>

  <script>
    const display = document.getElementById("display");

    function append(value) {
      display.value += value;
    }

    function clearDisplay() {
      display.value = "";
    }

    function calculate() {
      try {
        display.value = eval(display.value);
      } catch {
        display.value = "Erro";
      }
    }
  </script>

</body>
</html>
